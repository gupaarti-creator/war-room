async function runAdversarialDebate(redoNote) {
  addHTML('<div class="phase-header"><span class="phase-badge">Phase 1 — Brainstorm · Adversarial Debate</span></div>');

  var wrap = document.createElement('div');
  wrap.className = 'debate-wrap';

  var titleEl = document.createElement('div');
  titleEl.className = 'debate-title';
  titleEl.textContent = '⚔ Agents debating: "' + currentTopic + '"';
  wrap.appendChild(titleEl);

  var statusEl = document.createElement('div');
  statusEl.className = 'debate-status';
  statusEl.innerHTML = '<span>⟳</span> <span>Starting debate...</span>';
  wrap.appendChild(statusEl);

  document.getElementById('pipelineOutput').appendChild(wrap);
  window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'});

  // Build research context
  var researchCtx = '';
  if (brain.research) {
    var r = brain.research;
    if (r.lockedProblem) researchCtx += "LOCKED PROBLEM TO SOLVE: " + r.lockedProblem + "\n";
    if (r.lockedPersona) researchCtx += "TARGET PERSONA: " + r.lockedPersona + "\n";
    if (r.lockedDesignPrinciple) researchCtx += "DESIGN PRINCIPLE: " + r.lockedDesignPrinciple + "\n\n";
    if (r.insight && r.insight.northStar) researchCtx += "North star: " + r.insight.northStar + "\n";
    if (r.insight && r.insight.coreTensions) researchCtx += "Core tensions: " + (r.insight.coreTensions||[]).map(function(t){ return t.tension; }).join("; ") + "\n";
    if (r.user && r.user.customerNeeds) researchCtx += "Top needs: " + (r.user.customerNeeds||[]).filter(function(n){ return n.urgency==="high"; }).map(function(n){ return n.need; }).join("; ") + "\n";
    if (r.market && r.market.marketGaps) researchCtx += "Market gaps: " + (r.market.marketGaps||[]).map(function(g){ return g.gap; }).join("; ") + "\n";
  }
  if (redoNote) researchCtx += "Team feedback: " + redoNote + "\n";

  var transcript = []; // {agentId, agentName, text, signal, round}
  var signals = {}; // agentId -> last signal
  DEBATE_AGENTS.forEach(function(a){ signals[a.id] = {type:'challenge',note:''}; });

  var round = 0;
  var forcedEnd = false;

  // Wait for force convergence
  // Force convergence bar - sticky at top of debate wrap
  var forceBar = document.createElement('div');
  forceBar.id = 'forceBar_' + Date.now();
  var forceBarId = forceBar.id;
  forceBar.style.cssText = 'position:sticky;top:60px;background:#2c1f0e;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:50;border-radius:3px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.3);';
  forceBar.innerHTML = '<span style="font-size:11px;color:#c8a96e;font-family:monospace;">⚔ Debate in progress — agents debating...</span>';
  forceBar.style.display = 'none'; // hidden until round 2

  var forceBtn = document.createElement('button');
  forceBtn.className = 'btn-primary';
  forceBtn.style.cssText = 'font-size:11px;padding:7px 16px;letter-spacing:1px;flex-shrink:0;';
  forceBtn.textContent = '⚡ Force Convergence';
  forceBtn.onclick = function() {
    forcedEnd = true;
    var fb = document.getElementById(forceBarId);
    if (fb) fb.remove();
  };
  forceBar.appendChild(forceBtn);
  wrap.appendChild(forceBar);

  // Round 0 — opening positions
  round = 1;
  statusEl.innerHTML = '<span>⟳</span> <span>Round 1 — Opening positions...</span>';

  for (var i = 0; i < DEBATE_AGENTS.length; i++) {
    var agent = DEBATE_AGENTS[i];
    var openingPrompt = "Product idea: \"" + currentTopic + "\"\n" + researchCtx + "\nGive your opening position on this product idea. Be specific and bold.";
    try {
      var raw = await callAgent(agent.system, openingPrompt);
      var signal = parseSignal(raw);
      signals[agent.id] = signal;
      var clean = addDebateMsg(wrap, agent, raw, round, signal);
      transcript.push({agentId:agent.id, agentName:agent.name, text:clean, signal:signal.type+(signal.note?': '+signal.note:''), round:round});
      updateStatus(statusEl, signals, round);
    } catch(e) {
      showError(agent.name + ' failed: ' + e.message);
    }
  }

  showAlignmentBar(wrap, signals);

  // Show force convergence button from round 2 onwards
  forceBar.style.display = 'flex';
  forceBar.querySelector('span').textContent = '⚔ Round 1 complete — continuing debate...';

  // Debate loop
  while (!forcedEnd) {
    var allResolved = Object.values(signals).every(function(s){ return signalIsResolved(s); });
    if (allResolved) break;

    round++;
    statusEl.innerHTML = '<span>⟳</span> <span>Round ' + round + ' — Agents responding...</span>';
    var resolvedCnt = Object.values(signals).filter(function(s){return signalIsResolved(s);}).length; var blockerCnt = Object.values(signals).filter(function(s){return s.type==='blocker';}).length; if (forceBar.querySelector('span')) forceBar.querySelector('span').textContent = '⚔ Round '+(round-1)+' · '+resolvedCnt+'/5 resolved'+(blockerCnt>0?' · 🚫 '+blockerCnt+' blocker(s)':'');

    // Check if not improving after 4 rounds
    if (round > 4) {
      var stillChallenging = Object.values(signals).filter(function(s){ return s === 'challenge'; }).length;
      if (stillChallenging > 1) {
        var warnEl = document.createElement('div');
        warnEl.style.cssText = 'background:#fff3cd;border:1px solid #c8a96e;border-radius:3px;padding:8px 12px;font-size:11px;color:#856404;font-family:monospace;margin:8px 0;';
        warnEl.textContent = '⚠ Agents still debating after ' + round + ' rounds. Use the ⚡ Force Convergence button at the top of the debate to end it.';
        wrap.appendChild(warnEl);
      }
    }

    // Build transcript context for this round
    var lastMessages = transcript.slice(-8).map(function(m){
      return m.agentName + ' [' + m.signal.toUpperCase() + ']: ' + m.text;
    }).join("\n\n");

    for (var j = 0; j < DEBATE_AGENTS.length; j++) {
      var debateAgent = DEBATE_AGENTS[j];
      if (forcedEnd) break;

    var roundPrompt = "Product: \"" + currentTopic + "\"\n\n" +
      "DEBATE SO FAR (last messages):\n" + lastMessages + "\n\n" +
      "Current alignment: " + Object.entries(signals).map(function(e){ return e[0] + ":" + e[1]; }).join(", ") + "\n\n" +
      "Your turn. Respond to the debate. Challenge weak points or align if satisfied. Remember your role.";

      try {
        var roundRaw = await callAgent(debateAgent.system, roundPrompt);
        var roundSignal = parseSignal(roundRaw);
        signals[debateAgent.id] = roundSignal;
        var roundClean = addDebateMsg(wrap, debateAgent, roundRaw, round, roundSignal);
        transcript.push({agentId:debateAgent.id, agentName:debateAgent.name, text:roundClean, signal:roundSignal.type+(roundSignal.note?': '+roundSignal.note:''), round:round});
        updateStatus(statusEl, signals, round);
      } catch(e) {
        showError(debateAgent.name + ' round ' + round + ' failed: ' + e.message);
      }
    }

    showAlignmentBar(wrap, signals);

    // Check alignment after each full round
    var nowAligned = Object.values(signals).every(function(s){ return s === 'aligned'; });
    if (nowAligned) break;
  }

  // Run synthesizer
  statusEl.innerHTML = '<span>⟳</span> <span>All positions resolved — Synthesizer locking concept...</span>';
  forceBtn.style.display = 'none';

  var fullTranscript = transcript.map(function(m){
    return '[Round ' + m.round + '] ' + m.agentName + ' [' + m.signal.toUpperCase() + ']: ' + m.text;
    }).join("\n\n");

  var synthPrompt = "Product: \"" + currentTopic + "\"\n\nFULL DEBATE TRANSCRIPT:\n" + fullTranscript + "\n\nNow synthesize the concept that survived all challenges.";

  try {
    var synthRaw = await callAgent(SYNTHESIZER.system, synthPrompt, 2000);
    var synthParsed = tryJSON(synthRaw);

    if (synthParsed) {
      brain.brainstorm = { synthesis: synthParsed, transcript: transcript, rounds: round };

      // Show locked concept card
      var conceptCard = document.createElement('div');
      conceptCard.style.cssText = 'background:#ede0c8;border-left:3px solid #8b4513;padding:14px 16px;border-radius:0 4px 4px 0;margin-top:14px;';
      var cHtml = '<div style="font-size:9px;letter-spacing:3px;font-family:monospace;color:#8b4513;text-transform:uppercase;margin-bottom:10px">🎯 Locked Concept — ' + round + ' rounds · ' + transcript.length + ' exchanges</div>';
      cHtml += '<div style="font-size:15px;font-weight:bold;color:#2c1f0e;margin-bottom:3px">' + escH(synthParsed.productName||'') + '</div>';
      cHtml += '<div style="font-size:12px;color:#4a3520;font-style:italic;margin-bottom:10px">' + escH(synthParsed.oneLiner||'') + '</div>';
      cHtml += '<div style="font-size:11px;color:#6b5540;margin-bottom:3px"><strong>User:</strong> ' + escH(synthParsed.targetUser||'') + '</div>';
      cHtml += '<div style="font-size:11px;color:#6b5540;margin-bottom:3px"><strong>Insight:</strong> ' + escH(synthParsed.coreInsight||'') + '</div>';
      cHtml += '<div style="font-size:11px;color:#6b5540;margin-bottom:10px"><strong>Different because:</strong> ' + escH(synthParsed.whatMakesItDifferent||'') + '</div>';
      if (synthParsed.keyTensionResolved) cHtml += '<div style="font-size:11px;color:#6b5540;margin-bottom:10px"><strong>Key tension resolved:</strong> ' + escH(synthParsed.keyTensionResolved) + '</div>';
      cHtml += '<div style="font-size:9px;letter-spacing:2px;font-family:monospace;color:#8b4513;margin-bottom:6px">V1 SHIPS</div>';
      (synthParsed.v1Features||[]).forEach(function(f){ cHtml += '<div style="font-size:11px;color:#3d2b1a;margin-bottom:2px">› ' + escH(f) + '</div>'; });
      if ((synthParsed.blockersResolved||[]).length > 0) {
        cHtml += '<div style="font-size:9px;letter-spacing:2px;font-family:monospace;color:#721c24;margin:10px 0 5px;text-transform:uppercase;">🚫 Blockers Resolved</div>';
        (synthParsed.blockersResolved||[]).forEach(function(b){ cHtml += '<div style="font-size:11px;color:#3d2b1a;margin-bottom:3px;padding:4px 8px;background:rgba(198,40,40,0.06);border-radius:3px;">✓ <strong>' + escH(b.blocker||'') + '</strong> → ' + escH(b.resolution||'') + '</div>'; });
      }
      if ((synthParsed.risksAccepted||[]).length > 0) {
        cHtml += '<div style="font-size:9px;letter-spacing:2px;font-family:monospace;color:#856404;margin:10px 0 5px;text-transform:uppercase;">⚠ Risks Accepted</div>';
        (synthParsed.risksAccepted||[]).forEach(function(r){ cHtml += '<div style="font-size:11px;color:#3d2b1a;margin-bottom:3px;padding:4px 8px;background:rgba(133,100,4,0.06);border-radius:3px;">• <strong>' + escH(r.risk||'') + '</strong> — ' + escH(r.reason||'') + '</div>'; });
      }
      if ((synthParsed.mitigationsApplied||[]).length > 0) {
        cHtml += '<div style="font-size:9px;letter-spacing:2px;font-family:monospace;color:#004085;margin:10px 0 5px;text-transform:uppercase;">🔧 Mitigations Applied</div>';
        (synthParsed.mitigationsApplied||[]).forEach(function(m){ cHtml += '<div style="font-size:11px;color:#3d2b1a;margin-bottom:3px;padding:4px 8px;background:rgba(0,64,133,0.06);border-radius:3px;">🔧 <strong>' + escH(m.risk||'') + '</strong> → ' + escH(m.mitigation||'') + '</div>'; });
      }
      conceptCard.innerHTML = cHtml;
      wrap.appendChild(conceptCard);
      statusEl.innerHTML = '<span style="color:#4a7c59">✓</span> <span>Debate complete — ' + round + ' rounds, concept locked</span>';
    }
  } catch(e) {
    showError('Synthesizer failed: ' + e.message);
  }

  return transcript;
}

// ── RUN PHASE ────────────────────────────────────────────
async function runPhase(phase, redoNote) {
  addHTML('<div class="phase-header"><span class="phase-badge">' + phase.label + '</span></div>');
  const outputs = [];
  const loops = [];

  for (const agent of phase.agents) {
    const runId = showRunning(agent.name, agent.emoji);
    try {
      const ctx = buildContext(phase.id, agent.id, outputs, redoNote);
      var isCodeAgt = ['ui','frontend','backend','techlead'].indexOf(agent.id) !== -1;
      const raw = await callAgent(agent.system, ctx, isCodeAgt ? 3000 : 1200);
      const parsed = tryJSON(raw);

      brain[phase.id] = brain[phase.id] || {};
      brain[phase.id][agent.id] = parsed || raw;

      // Store code artifacts
      if (["frontend","backend","techlead"].includes(agent.id)) {
        const match = raw.match(/<!DOCTYPE html[\s\S]*/i) || raw.match(/<html[\s\S]*/i);
        if (match) { brain.latestCode = match[0]; finalCode = match[0]; }
      }

      // QA auto-fix
      if (agent.id==="qa" && parsed && parsed.fixedCode && parsed.fixedCode.length > 100) {
        brain.latestCode = parsed.fixedCode;
        finalCode = parsed.fixedCode;
        const critical = (parsed.bugs||[]).filter(b=>b.severity==="red");
        if (critical.length) loops.push(critical.length + " critical bug(s) auto-fixed by Tech Lead review");
      }

      outputs.push({agent, raw, parsed});
      removeEl(runId);
    } catch(e) {
      removeEl(runId);
      showError(agent.name + " failed: " + e.message);
      outputs.push({agent, raw:"(error: "+e.message+")", parsed:null});
    }
  }

  const card = buildCard(phase, outputs, loops);
  addEl(card);
  return outputs;
}

// ── MAIN PIPELINE ─────────────────────────────────────────
async function startPipeline() {
  const topic = document.getElementById("topicInput").value.trim();
  if (!topic) { showError("Please enter a product idea."); return; }
  currentTopic = topic;
  brain = {};
  finalCode = "";
  document.getElementById("inputScreen").style.display = "none";
  document.getElementById("pipelineOutput").style.display = "block";
  document.getElementById("topicDisplay").textContent = topic;

  for (var pi = 0; pi < PHASES.length; pi++) {
    var phase = PHASES[pi];
    var redoNote = null;
    var redo = true;

    while (redo) {
      // Special research phase
      if (phase.adversarialResearch) {
        await runResearchPhase(redoNote);
        var resDecision = await waitForApproval(phase.label, phase.id);
        if (resDecision === "approve") {
          redo = false;
        } else {
          redoNote = await getRedoNote();
          if (!redoNote) redo = false;
          var resHeaders = document.getElementById("pipelineOutput").querySelectorAll(".phase-header");
          if (resHeaders.length) resHeaders[resHeaders.length-1].remove();
          var resCards = document.getElementById("pipelineOutput").querySelectorAll(".phase-card");
          if (resCards.length) resCards[resCards.length-1].remove();
        }
        continue;
      }

      // Special adversarial brainstorm phase
      if (phase.adversarial) {
        var debateTranscript = await runAdversarialDebate(redoNote);
        var debateDecision = await waitForApproval(phase.label, phase.id);
        if (debateDecision === "approve") {
          redo = false;
        } else {
          redoNote = await getRedoNote();
          if (!redoNote) redo = false;
          // Clear debate output for redo
          var debateHeaders = document.getElementById("pipelineOutput").querySelectorAll(".phase-header");
          if (debateHeaders.length) debateHeaders[debateHeaders.length-1].remove();
          var debateWraps = document.getElementById("pipelineOutput").querySelectorAll(".debate-wrap");
          if (debateWraps.length) debateWraps[debateWraps.length-1].remove();
        }
        continue;
      }

      var phaseOutputs = await runPhase(phase, redoNote);
      var out = document.getElementById("pipelineOutput");

      // Special validate phase — show fix selector instead of normal approval
      if (phase.id === "validate") {
        var prioritizerOut = phaseOutputs.find(function(o){ return o.agent.id === "prioritizer"; });
        var prioritizerData = (prioritizerOut && prioritizerOut.parsed) ? prioritizerOut.parsed : null;
        var fixLoopCount = 0;
        var prevRemainingCount = 999;

        while (true) {
          if (!prioritizerData) break;

          var fixDecision = await showFixSelector(prioritizerData, fixLoopCount);
          if (fixDecision.action === "skip" || !fixDecision.fixes || fixDecision.fixes.length === 0) break;

          var fixInstructions = "Fix these specific issues:\n" + fixDecision.fixes.map(function(f,i){ return (i+1) + ". " + f; }).join("\n");
          brain.selectedFixes = fixInstructions;
          fixLoopCount++;

          // Rerun Tech Lead with fixes
          addHTML('<div class="phase-header"><span class="phase-badge">Fix Loop ' + fixLoopCount + ' — Tech Lead Applying Fixes</span></div>');
          var tlRunId = showRunning("Tech Lead", "🤖");
          try {
            var tlCtx = buildContext("build", "techlead", [], fixInstructions);
            var tlRaw = await callAgent('You are the Tech Lead. Apply these specific fixes to the code. CRITICAL: Output only HTML. First character must be < and last must be >. No text before or after. No code fences. Start with <!DOCTYPE html><html> and end with </html>.', tlCtx);
            var htmlMatch = tlRaw.match(/<!DOCTYPE html[\s\S]*/i) || tlRaw.match(/<html[\s\S]*/i);
            if (htmlMatch) { brain.latestCode = htmlMatch[0]; finalCode = htmlMatch[0]; }
            removeEl(tlRunId);
          } catch(e) { removeEl(tlRunId); showError("Tech Lead fix failed: " + e.message); break; }

          // Rerun QA
          addHTML('<div class="phase-header"><span class="phase-badge">Fix Loop ' + fixLoopCount + ' — QA Revalidating</span></div>');
          var qaRunId = showRunning("QA Engineer", "🧪");
          try {
            var qaCtx = buildContext("validate", "qa", [], null);
            var qaRaw = await callAgent('You are the QA Engineer. Review the code. Respond ONLY with a JSON object (no markdown) with keys: bugs (array of {severity: red or yellow or green, description (max 80 chars), fix (max 100 chars)} max 5), overallQuality (string max 60 chars), fixedCode (empty string).', qaCtx);
            var qaParsed = tryJSON(qaRaw);
            removeEl(qaRunId);

            var qaCard = document.createElement("div");
            qaCard.className = "cork-card phase-card";
            qaCard.style.animation = "slideUp 0.4s ease";
            var qaHtml = '<div class="card-label">QA Result — Fix Loop ' + fixLoopCount + '</div>';

            if (qaParsed) {
              qaHtml += '<div class="section-title">Quality: ' + escH(qaParsed.overallQuality||"") + '</div>';
              var remaining = (qaParsed.bugs||[]).filter(function(b){ return b.severity==="red" || b.severity==="yellow"; });

              if (remaining.length === 0) {
                // Clean — exit loop
                qaHtml += '<div class="bullet"><span class="arr" style="color:#4a7c59">✓</span><span style="color:#4a7c59"><strong>All issues resolved — ready for launch!</strong></span></div>';
                qaCard.innerHTML = qaHtml;
                document.getElementById("pipelineOutput").appendChild(qaCard);
                prioritizerData = null;
                break;
              }

              // Show remaining issues
              remaining.forEach(function(b){
                qaHtml += '<div class="issue-row ' + b.severity + '"><div class="sev-tag ' + b.severity + '">' + (b.severity==="red"?"🔴 CRITICAL":"🟡 MODERATE") + '</div>' + escH(b.description||"") + ' → ' + escH(b.fix||"") + '</div>';
              });

              // Warn if not improving
              if (remaining.length >= prevRemainingCount) {
                qaHtml += '<div class="loop-row">⚠️ Quality not improving after ' + fixLoopCount + ' loop(s). Consider skipping or redoing the Build phase entirely.</div>';
              }
              prevRemainingCount = remaining.length;

              // Update prioritizer for next loop
              prioritizerData = {
                mustFix: remaining.filter(function(b){ return b.severity==="red"; }).map(function(b,i){ return {id:i, issue:b.description, reason:b.fix, effort:"med"}; }),
                shouldFix: remaining.filter(function(b){ return b.severity==="yellow"; }).map(function(b,i){ return {id:i, issue:b.description, reason:b.fix, effort:"med"}; }),
                skip: [],
                recommendation: remaining.length + " issue(s) remaining after loop " + fixLoopCount + ". Select fixes to continue or skip to launch."
              };
            }
            qaCard.innerHTML = qaHtml;
            document.getElementById("pipelineOutput").appendChild(qaCard);
            window.scrollTo({top:document.body.scrollHeight, behavior:"smooth"});
          } catch(e) { removeEl(qaRunId); showError("QA revalidation failed: " + e.message); break; }
        }

        redo = false; // validate phase never redoes from approval, fix loop handles it
        continue;
      }

      // Normal phases
      var decision = await waitForApproval(phase.label, phase.id);
      if (decision === "approve") {
        redo = false;
      } else if (decision === "fixdesign" || decision === "fixbuild") {
        // Run targeted fix agent for flagged issues
        var issuePhase = decision === "fixdesign" ? "design" : "build";
        var fixAgent = decision === "fixdesign" ? "ui" : "techlead";
        var fixNote = "Critical issues were flagged. Fix all accessibility and quality issues from the previous review. Focus on the flagged problems only.";
        addHTML('<div class="phase-header"><span class="phase-badge">Targeted Fix — ' + (decision === "fixdesign" ? "UI Designer" : "Tech Lead") + ' Addressing Issues</span></div>');
        var fixRunId = showRunning(decision === "fixdesign" ? "UI Designer" : "Tech Lead", decision === "fixdesign" ? "🎨" : "🤖");
        try {
          var fixCtx = buildContext(issuePhase, fixAgent, [], fixNote);
          var fixSystem = decision === "fixdesign"
            ? "You are the UI Designer. Fix all flagged accessibility and design issues. CRITICAL: Output only HTML. First character must be < last must be >. No text before or after. No fences. Start with <!DOCTYPE html><html> end with </html>."
            : "You are the Tech Lead. Fix all flagged build and quality issues. CRITICAL: Output only HTML. First character must be < last must be >. No text before or after. No fences. Start with <!DOCTYPE html><html> end with </html>.";
          var fixRaw = await callAgent(fixSystem, fixCtx);
          var fenceM = fixRaw.match(/```html?\s*([\s\S]*?)```/i) || fixRaw.match(/```([\s\S]*?)```/);
          if (fenceM) fixRaw = fenceM[1].trim();
          var htmlM = fixRaw.match(/<!DOCTYPE html[\s\S]*/i) || fixRaw.match(/<html[\s\S]*/i);
          if (htmlM) {
            if (decision === "fixdesign") { brain.design = brain.design || {}; brain.design.ui = htmlM[0]; }
            else { brain.latestCode = htmlM[0]; finalCode = htmlM[0]; }
          }
          removeEl(fixRunId);
          // Show new preview
          if (htmlM) {
            var fixCard = document.createElement("div");
            fixCard.className = "cork-card phase-card";
            fixCard.style.animation = "slideUp 0.4s ease";
            fixCard.innerHTML = '<div class="card-label">Fixed Output</div><div class="bullet"><span class="arr" style="color:#4a7c59">✓</span><span>Issues addressed — preview updated below</span></div>';
            var previewWrap = document.createElement("div");
            previewWrap.className = "preview-wrap";
            previewWrap.style.marginTop = "14px";
            var toolbar = document.createElement("div");
            toolbar.className = "preview-toolbar";
            toolbar.innerHTML = '<span>🎨 Fixed Preview</span>';
            var fixIframe = document.createElement("iframe");
            fixIframe.className = "preview-iframe";
            var fixBlob = new Blob([htmlM[0]], {type:"text/html"});
            fixIframe.src = URL.createObjectURL(fixBlob);
            previewWrap.appendChild(toolbar);
            previewWrap.appendChild(fixIframe);
            fixCard.appendChild(previewWrap);
            document.getElementById("pipelineOutput").appendChild(fixCard);
            window.scrollTo({top:document.body.scrollHeight, behavior:"smooth"});
          }
        } catch(e) { removeEl(fixRunId); showError("Fix failed: " + e.message); }
        // Show approval again
        var fixDecision = await waitForApproval(phase.label, phase.id);
        if (fixDecision === "approve") redo = false;
        else if (fixDecision === "redo") {
          redoNote = await getRedoNote();
          if (!redoNote) redo = false;
        } else redo = false;
      } else {
        redoNote = await getRedoNote();
        if (!redoNote) { redo = false; continue; }
        var cards = out.querySelectorAll(".phase-card");
        if (cards.length) cards[cards.length-1].remove();
        var headers = out.querySelectorAll(".phase-header");
        if (headers.length) headers[headers.length-1].remove();
      }
    }
  }

  document.getElementById("doneScreen").style.display = "block";
  window.scrollTo({top:document.body.scrollHeight, behavior:"smooth"});
}

// ── BRIEF ─────────────────────────────────────────────────
function showBrief() {
  const el = document.getElementById("briefOutput");
  if (el.style.display !== "none") { el.style.display = "none"; return; }

  let html = '<div class="brief-wrap">';

  const sections = [
    {key:"research", title:"Research", agents:[
      {id:"market", label:"Market", fields:["marketGap","marketSize","keyTrends"]},
      {id:"user", label:"Users", fields:["painPoints","targetPersona"]},
      {id:"analyst", label:"Financials", fields:["TAM","SAM","suggestedModel","pricingBenchmark"]}
    ]},
    {key:"strategy", title:"Strategy", agents:[
      {id:"pm", label:"Product", fields:["productName","tagline","userStories","outOfScope"]},
      {id:"legal", label:"Legal", fields:["coppaRequired","flags"]},
      {id:"monetization", label:"Pricing", fields:["model","monthlyPrice","annualPrice","freeFeatures","paidFeatures","rationale"]}
    ]},
    {key:"design", title:"Design", agents:[
      {id:"ux", label:"UX", fields:["screens","userJourney","designPrinciples"]},
      {id:"a11y", label:"Accessibility", fields:["wcagLevel","mobileScore","issues"]}
    ]},
    {key:"validate", title:"Validation", agents:[
      {id:"qa", label:"QA", fields:["overallQuality","bugs"]},
      {id:"tester", label:"User Testing", fields:["overallScore","topFix","personas"]}
    ]},
    {key:"launch", title:"Launch", agents:[
      {id:"marketer", label:"Marketing", fields:["tagline","elevatorPitch","launchTweet","targetAudience"]},
      {id:"growth", label:"Growth", fields:["northStarMetric","week1Goal","channels"]},
      {id:"analyst2", label:"Success Metrics", fields:["kpis","firstReviewPoint","successDefinition"]}
    ]}
  ];

  sections.forEach(section => {
    const phaseData = brain[section.key];
    if (!phaseData) return;
    html += '<div class="brief-phase"><div class="brief-phase-title">' + section.title + '</div>';
    section.agents.forEach(a => {
      const data = phaseData[a.id];
      if (!data) return;
      const obj = typeof data === "object" ? data : {};
      a.fields.forEach(f => {
        const val = obj[f];
        if (!val) return;
        const display = Array.isArray(val)
          ? val.map(v => typeof v === "object" ? JSON.stringify(v) : v).join(" · ")
          : String(val);
        html += '<div class="brief-item"><strong>' + f + ':</strong> ' + escH(display.slice(0,200)) + '</div>';
      });
    });
    html += '</div>';
  });

  html += '</div>';
  el.innerHTML = html;
  el.style.display = "block";
  window.scrollTo({top:document.body.scrollHeight, behavior:"smooth"});
}

function downloadApp() {
  if (!finalCode) { showError("No app generated yet."); return; }
  const blob = new Blob([finalCode], {type:"text/html"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = currentTopic.slice(0,30).replace(/\s+/g,"-").toLowerCase() + ".html";
  a.click();
}

function resetAll() {
  brain={}; currentTopic=""; finalCode="";
  document.getElementById("pipelineOutput").innerHTML="";
  document.getElementById("pipelineOutput").style.display="none";
  document.getElementById("doneScreen").style.display="none";
  document.getElementById("briefOutput").style.display="none";
  document.getElementById("inputScreen").style.display="block";
  document.getElementById("topicInput").value="";
  document.getElementById("topicDisplay").textContent="";
}
</script>
